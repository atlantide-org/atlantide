name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    # The postgres state backend is exercised against a real server; the rest of
    # the suite runs without it (see tests/state/conftest.py).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: atlantide
          POSTGRES_DB: atlantide
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      ATLANTIDE_TEST_PG_DSN: postgresql://postgres:atlantide@localhost:5432/atlantide
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Lockfile up to date
        run: uv lock --check
      - name: Install
        run: uv sync --extra dev --extra postgres
      - name: Lint
        run: uv run ruff check .
      - name: Types
        run: uv run mypy
      - name: Import contracts
        run: uv run lint-imports
      - name: Tests
        run: uv run pytest -q
